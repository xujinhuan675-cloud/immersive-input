<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/icon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script>var Module;</script>
        <title>Immersive Input</title>
        <style>
            /* 启动 loading 递层：React 挂载前立即可见，消除透明空白期 */
            * { margin: 0; padding: 0; box-sizing: border-box; }
            /* 全层透明，确保透明窗口四角显示桌面
               !important 覆盖 NextUI 主题 class 注入的背景色 */
            html, body, #root { height: 100%; background: transparent !important; }

            #app-loading {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                background: #ffffff;
                z-index: 9999;
                opacity: 1;
                transition: opacity 0.18s ease;
            }
            #app-loading.fade-out {
                opacity: 0;
                pointer-events: none;
            }
            #app-loading img {
                width: 56px;
                height: 56px;
                border-radius: 12px;
            }
            #app-loading .app-name {
                font-family: -apple-system, 'Segoe UI', sans-serif;
                font-size: 13px;
                font-weight: 600;
                color: #444;
                letter-spacing: 0.02em;
            }
            #app-loading-debug {
                display: none;
                max-width: min(720px, calc(100vw - 32px));
                max-height: 40vh;
                overflow: auto;
                padding: 10px 12px;
                border-radius: 10px;
                background: #fff4f4;
                color: #b42318;
                border: 1px solid #fecdca;
                font-family: Consolas, 'SFMono-Regular', monospace;
                font-size: 11px;
                line-height: 1.45;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .app-spinner {
                width: 18px;
                height: 18px;
                border: 2px solid #e5e5e5;
                border-top-color: #9b9b9b;
                border-radius: 50%;
                animation: _spin 0.75s linear infinite;
            }
            @keyframes _spin { to { transform: rotate(360deg); } }
        </style>
    </head>

    <body>
        <!-- loading 递层默认隐藏，仅 config 窗口需要 -->
        <!-- 对透明窗口（float_toolbar/translate 等）不展示，防止白色背景在 WebView2 合成层残留 -->
        <div id="app-loading" style="display:none">
            <img src="/icon.svg" alt="" />
            <span class="app-name">Immersive Input</span>
            <div class="app-spinner"></div>
            <pre id="app-loading-debug"></pre>
        </div>
        <script>
            (function () {
                try {
                    var bootErrors = [];
                    window.__BOOT_ERRORS__ = bootErrors;
                    window.__earlyBootErrors = bootErrors;

                    function showBootError(message) {
                        bootErrors.push({
                            message: String(message),
                            ts: new Date().toISOString(),
                        });
                        try {
                            console.error('[boot]', message);
                        } catch (_) {}
                        var el = document.getElementById('app-loading-debug');
                        if (el) {
                            el.style.display = 'block';
                            el.textContent = bootErrors
                                .map(function (entry) {
                                    return '[' + entry.ts + '] ' + entry.message;
                                })
                                .join('\n');
                        }
                    }

                    window.addEventListener('error', function (event) {
                        var location = '';
                        if (event.filename) {
                            location =
                                ' @ ' +
                                event.filename +
                                ':' +
                                (event.lineno || 0) +
                                ':' +
                                (event.colno || 0);
                        }
                        showBootError('window.error: ' + (event.message || event.error || 'Unknown error') + location);
                    });

                    window.addEventListener('unhandledrejection', function (event) {
                        var reason = event.reason;
                        if (reason && reason.stack) {
                            showBootError('unhandledrejection: ' + reason.stack);
                            return;
                        }
                        showBootError('unhandledrejection: ' + (reason && reason.message ? reason.message : String(reason)));
                    });

                    var meta = window.__TAURI_METADATA__;
                    var currentWindow = meta && meta.__currentWindow;
                    if (currentWindow && currentWindow.label === 'config') {
                        var el = document.getElementById('app-loading');
                        if (el) el.style.display = 'flex';
                    }
                } catch (_) {}
            })();
        </script>

        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
