<?xml version="1.0" encoding="UTF-8"?>
<!--
  IconF — 双色眼睛点 + 虹膜光环
  viewBox 1024x1024，可无损缩放到任意尺寸
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="pink" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="40%"  stop-color="#1e293b"/>
      <stop offset="70%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="white"/>
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect x="113" y="338" width="798" height="174" rx="41" ry="41" fill="rgba(253,224,71,0.65)"/>
    <rect x="113" y="543" width="594" height="133" rx="41" ry="41" fill="rgba(196,181,253,0.5)"/>
    <rect x="635" y="0" width="389" height="1024" fill="url(#pink)"/>
    <circle cx="512" cy="512" r="164" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="26"/>
    <circle cx="512" cy="512" r="102" fill="none" stroke="rgba(236,72,153,0.4)" stroke-width="18"/>
    <text x="344" y="632" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="348" fill="#1e293b" text-anchor="middle">I</text>
    <circle cx="512" cy="512" r="51" fill="url(#dot)" filter="url(#glow)"/>
    <text x="680" y="632" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="348" fill="#1e293b" text-anchor="middle">I</text>
  </g>
</svg>
