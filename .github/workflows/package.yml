name: Flow Input Package

on:
    push:
        branches:
            - master
        tags:
            - '*'

permissions: write-all

env:
    APP_SLUG: flow-input

jobs:
    build-for-macos:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      asset_arch: aarch64
                    - target: x86_64-apple-darwin
                      asset_arch: x64

        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 21

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Add Rust target
              run: rustup target add ${{ matrix.target }}

            - name: Resolve version
              run: |
                  VERSION=$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync('package.json','utf8')).version)")
                  echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Install dependencies
              run: pnpm install

            - name: Build and package
              run: |
                  export TAURI_PRIVATE_KEY="${{ secrets.TAURI_PRIVATE_KEY }}"
                  export TAURI_KEY_PASSWORD="${{ secrets.TAURI_KEY_PASSWORD }}"
                  export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
                  export APPLE_CERTIFICATE="${{ secrets.APPLE_CERTIFICATE }}"
                  export APPLE_CERTIFICATE_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
                  export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
                  export APPLE_API_ISSUER="${{ secrets.APPLE_API_ISSUER }}"
                  export APPLE_API_KEY="${{ secrets.APPLE_API_KEY }}"
                  export APPLE_ID="${{ secrets.APPLE_ID }}"
                  export APPLE_PASSWORD="${{ secrets.APPLE_PASSWORD }}"
                  pnpm tauri build --target ${{ matrix.target }}

            - name: Normalize artifact names
              run: |
                  MACOS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
                  DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
                  APP_ARCHIVE_NAME="${APP_SLUG}_${APP_VERSION}_${{ matrix.asset_arch }}.app.tar.gz"
                  DMG_NAME="${APP_SLUG}_${APP_VERSION}_${{ matrix.asset_arch }}.dmg"

                  APP_ARCHIVE_PATH="$(find "$MACOS_DIR" -maxdepth 1 -type f -name "*.app.tar.gz" ! -name "$APP_ARCHIVE_NAME" -print -quit)"
                  if [ -z "$APP_ARCHIVE_PATH" ]; then
                    echo "Missing macOS updater bundle"
                    exit 1
                  fi
                  mv "$APP_ARCHIVE_PATH" "$MACOS_DIR/$APP_ARCHIVE_NAME"

                  if [ -f "${APP_ARCHIVE_PATH}.sig" ]; then
                    mv "${APP_ARCHIVE_PATH}.sig" "$MACOS_DIR/${APP_ARCHIVE_NAME}.sig"
                  fi

                  DMG_PATH="$(find "$DMG_DIR" -maxdepth 1 -type f -name "*.dmg" ! -name "$DMG_NAME" -print -quit)"
                  if [ -z "$DMG_PATH" ]; then
                    echo "Missing macOS dmg bundle"
                    exit 1
                  fi
                  mv "$DMG_PATH" "$DMG_DIR/$DMG_NAME"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: flow-input_macos_${{ matrix.asset_arch }}
                  path: |
                      src-tauri/target/${{ matrix.target }}/release/bundle/dmg/flow-input_*_${{ matrix.asset_arch }}.dmg
                      src-tauri/target/${{ matrix.target }}/release/bundle/macos/flow-input_*_${{ matrix.asset_arch }}.app.tar.gz
                      src-tauri/target/${{ matrix.target }}/release/bundle/macos/flow-input_*_${{ matrix.asset_arch }}.app.tar.gz.sig
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: |
                      src-tauri/target/${{ matrix.target }}/release/bundle/dmg/flow-input_*_${{ matrix.asset_arch }}.dmg
                      src-tauri/target/${{ matrix.target }}/release/bundle/macos/flow-input_*_${{ matrix.asset_arch }}.app.tar.gz
                      src-tauri/target/${{ matrix.target }}/release/bundle/macos/flow-input_*_${{ matrix.asset_arch }}.app.tar.gz.sig

    build-for-windows:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 21

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Add Rust target
              run: rustup target add x86_64-pc-windows-msvc

            - name: Resolve version
              shell: powershell
              run: |
                  $version = node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync('package.json','utf8')).version)"
                  Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$version"

            - name: Install dependencies
              run: pnpm install

            - name: Build and package
              shell: powershell
              run: |
                  $env:TAURI_PRIVATE_KEY="${{ secrets.TAURI_PRIVATE_KEY }}"
                  $env:TAURI_KEY_PASSWORD="${{ secrets.TAURI_KEY_PASSWORD }}"
                  pnpm tauri build -b msi updater --target x86_64-pc-windows-msvc

            - name: Normalize artifact names
              shell: powershell
              run: |
                  $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi"
                  $installer = Get-ChildItem -Path $bundleDir -Filter "*.msi" | Where-Object { $_.Name -notlike "*.msi.zip" } | Select-Object -First 1
                  $updaterZip = Get-ChildItem -Path $bundleDir -Filter "*.msi.zip" | Select-Object -First 1
                  $updaterSig = Get-ChildItem -Path $bundleDir -Filter "*.msi.zip.sig" | Select-Object -First 1

                  if (-not $installer -or -not $updaterZip -or -not $updaterSig) {
                      throw "Missing Windows bundle output"
                  }

                  Rename-Item -LiteralPath $installer.FullName -NewName "${env:APP_SLUG}_${env:APP_VERSION}_x64.msi"
                  Rename-Item -LiteralPath $updaterZip.FullName -NewName "${env:APP_SLUG}_${env:APP_VERSION}_x64.msi.zip"
                  Rename-Item -LiteralPath $updaterSig.FullName -NewName "${env:APP_SLUG}_${env:APP_VERSION}_x64.msi.zip.sig"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: flow-input_windows_x64
                  path: |
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi.zip
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi.zip.sig
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: |
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi.zip
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/flow-input_*_x64.msi.zip.sig

    release-manifest:
        needs:
            - build-for-macos
            - build-for-windows
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 21

            - name: Resolve version
              run: |
                  VERSION=$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync('package.json','utf8')).version)")
                  echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Generate updater manifest
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
              run: node updater/updater.mjs

            - name: Upload updater manifest
              uses: softprops/action-gh-release@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: latest.json
